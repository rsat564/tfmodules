---
name: "Module CI"

on:
  pull_request:
    branches: [main]
    
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  security-events: write

env:
  TF_VERSION: "1.7.0"
  TFLINT_VERSION: "v0.50.0"

jobs:
  # ─────────────────────────────────────────────────────────────
  # Format Check
  # ─────────────────────────────────────────────────────────────
  format:
    name: "Format"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Format Check
        run: terraform fmt -check -recursive -diff

  # ─────────────────────────────────────────────────────────────
  # Validate all modules
  # ─────────────────────────────────────────────────────────────
  validate:
    name: "Validate - ${{ matrix.module }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - vnet
          - vm
          - storage
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: ${{ matrix.module }}
      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ matrix.module }}

  # ─────────────────────────────────────────────────────────────
  # Lint
  # ─────────────────────────────────────────────────────────────
  lint:
    name: "Lint - ${{ matrix.module }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - vnet
          - vm
          - storage
    steps:
      - uses: actions/checkout@v4
      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}
      - name: Init TFLint
        run: tflint --init
        working-directory: ${{ matrix.module }}
      - name: Run TFLint
        run: tflint --force
        working-directory: ${{ matrix.module }}

  # ─────────────────────────────────────────────────────────────
  # Terraform Test Framework (unit tests per module)
  # ─────────────────────────────────────────────────────────────
  test:
    name: "Test - ${{ matrix.module }}"
    runs-on: ubuntu-latest
    needs: [validate]
    strategy:
      matrix:
        module:
          - vnet
          - vm
          - storage
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Azure Login (Service Principal)
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: ${{ matrix.module }}
      - name: Terraform Test
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: terraform test -no-color
        working-directory: ${{ matrix.module }}

  # ─────────────────────────────────────────────────────────────
  # Security Scan (tfsec + checkov)
  # ─────────────────────────────────────────────────────────────
  security:
    name: "Security Scan"
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v4

      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          additional_args: "--minimum-severity MEDIUM"
          soft_fail: true

      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          output_format: sarif
          output_file_path: results.sarif
          soft_fail: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────
  # Summary Gate (all checks must pass)
  # ─────────────────────────────────────────────────────────────
  summary:
    name: "CI Summary"
    runs-on: ubuntu-latest
    needs: [format, validate, lint, test, security]
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.format.result }}" == "failure" ] || \
             [ "${{ needs.validate.result }}" == "failure" ] || \
             [ "${{ needs.lint.result }}" == "failure" ] || \
             [ "${{ needs.test.result }}" == "failure" ]; then
            echo "::error::One or more CI checks failed."
            exit 1
          fi
          echo "✅ All CI checks passed."

      - name: Summary
        run: |
          echo "## Module CI Results" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Format | ${{ needs.format.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Validate | ${{ needs.validate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
